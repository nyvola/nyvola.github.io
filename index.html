<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nyvola · Studio</title>
<meta name="description" content="Nyvola, studio indépendant. Des applications domestiques, utiles, auto-hébergeables et sans pistage.">
<meta name="color-scheme" content="dark">
<link rel="icon" href="frigopolis.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=Newsreader:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16130D; --bg-2:#1E1A12; --cream:#ECE3CF; --muted:#938A75;
    --terra:#D5814F; --terra-soft:#b86c40; --grass:#8AA468;
    --line:rgba(236,227,207,.11); --line-2:rgba(236,227,207,.06);
    --maxw:980px; --serif:"Newsreader",Georgia,serif; --sans:"Hanken Grotesk",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--bg); color:var(--cream);
    font-family:var(--sans); font-size:17px; line-height:1.65; font-weight:400;
    -webkit-font-smoothing:antialiased;
  }
  body::after{ content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:radial-gradient(80% 50% at 78% -8%, rgba(213,129,79,.10), transparent 60%); }
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 clamp(22px,5vw,40px)}
  a{color:inherit; text-decoration:none}

  /* top line */
  .top{display:flex; align-items:center; justify-content:space-between; padding:26px 0; font-family:var(--sans); font-size:.74rem; font-weight:500; letter-spacing:.22em; text-transform:uppercase; color:var(--muted)}
  .top .nm{color:var(--cream)}
  .top .nm b{color:var(--terra); font-weight:500}

  /* hero */
  .hero{padding:clamp(56px,15vh,150px) 0 clamp(48px,11vh,110px); max-width:21ch}
  .hero .kick{font-size:.76rem; font-weight:600; letter-spacing:.24em; text-transform:uppercase; color:var(--terra); margin:0 0 26px}
  .hero h1{font-family:var(--serif); font-weight:300; font-size:clamp(2.7rem,8vw,5.4rem); line-height:1.02; letter-spacing:-.015em; margin:0}
  .hero h1 em{font-style:italic; color:var(--terra)}
  .hero p{font-family:var(--sans); color:var(--muted); font-size:clamp(1.02rem,1.7vw,1.2rem); max-width:46ch; margin:30px 0 0}

  /* list */
  .label{font-size:.74rem; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); padding-bottom:16px; border-bottom:1px solid var(--line)}
  .row{
    display:grid; grid-template-columns:2.4rem 1fr auto; gap:clamp(16px,4vw,40px); align-items:start;
    padding:clamp(28px,5vw,46px) 0; border-bottom:1px solid var(--line-2); position:relative;
  }
  .row .no{font-family:var(--serif); font-style:italic; color:var(--muted); font-size:1.05rem; line-height:1.7; transition:color .3s}
  .row:hover .no{color:var(--terra)}
  .row .main{min-width:0}
  .row h2{font-family:var(--serif); font-weight:400; font-size:clamp(1.7rem,4.4vw,2.7rem); line-height:1.08; margin:0; letter-spacing:-.01em; transition:color .3s}
  .row p{color:var(--muted); margin:12px 0 0; max-width:52ch; font-size:1.01rem}
  .row .status{display:inline-flex; align-items:center; gap:9px; margin-top:16px; font-size:.74rem; font-weight:600; letter-spacing:.13em; text-transform:uppercase; color:var(--muted)}
  .row .status .dot{width:7px; height:7px; border-radius:50%; background:var(--ac,var(--grass))}
  .row .links{display:flex; flex-wrap:wrap; gap:20px; margin-top:18px}
  .row .links a{font-size:.8rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--terra); display:inline-flex; gap:8px; align-items:center; transition:gap .25s, color .2s}
  .row .links a:hover{gap:13px; color:var(--cream)}
  .row .art{width:clamp(54px,8vw,82px); aspect-ratio:1; border-radius:15px; overflow:hidden; border:1px solid var(--line); opacity:.92; transition:transform .4s cubic-bezier(.2,.7,.2,1), opacity .3s}
  .row:hover .art{opacity:1; transform:translateY(-3px)}
  .row .art img{width:100%; height:100%; object-fit:cover; display:block}
  .row .art.mono{display:grid; place-items:center; background:var(--bg-2)}
  .row .art.mono span{font-family:var(--serif); font-style:italic; color:var(--ac,var(--grass)); font-size:1.8rem}
  .row.soon h2{color:var(--muted); font-style:italic}
  .row.soon{border-bottom:none}

  footer{margin-top:clamp(70px,12vh,130px); padding:28px 0 64px; border-top:1px solid var(--line); display:flex; flex-wrap:wrap; gap:8px 26px; justify-content:space-between; font-size:.82rem; color:var(--muted)}
  footer a{color:var(--terra)} footer a:hover{color:var(--cream)}

  .rv{opacity:0; transform:translateY(16px); animation:rise .8s cubic-bezier(.2,.7,.2,1) forwards; animation-delay:var(--d,0s)}
  @keyframes rise{to{opacity:1; transform:none}}
  :focus-visible{outline:2px solid var(--terra); outline-offset:3px; border-radius:3px}
  @media (max-width:600px){
    .row{grid-template-columns:1fr; gap:0}
    .row .no{font-size:.85rem; letter-spacing:.2em; text-transform:uppercase; margin-bottom:6px}
    .row .art{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important}}
</style>
</head>
<body>
  <div class="wrap">

    <div class="top rv" style="--d:.05s">
      <span class="nm"><b>✶</b> Nyvola</span>
      <span>Studio indépendant</span>
    </div>

    <header class="hero">
      <p class="kick rv" style="--d:.1s">Logiciels domestiques</p>
      <h1 class="rv" style="--d:.18s">Des outils <em>faits main</em> pour la maison.</h1>
      <p class="rv" style="--d:.32s">Des applications utiles, auto-hébergeables et sans pistage. Soignées jusqu'au détail, ajoutées une par une.</p>
    </header>

    <main>
      <div class="label rv" style="--d:.4s">Le catalogue</div>
      <div id="list"></div>
    </main>

    <footer class="rv" style="--d:.5s">
      <span>Nyvola, conçu et auto-hébergé avec soin.</span>
      <span><a href="mailto:nyvolastudio@gmail.com">nyvolastudio@gmail.com</a> · © <span class="y"></span></span>
    </footer>

  </div>

<script>
  /* =====================================================================
     Catalogue des applications (source unique).
     Ajouter une appli : copie un bloc { ... }.
       ac     : couleur d'accent (pastille de statut + monogramme).
       icon   : fichier image à la racine, ou null pour un monogramme.
       status : texte du statut (sans tiret cadratin svp).
       links  : autant de liens que voulu { label, href }.
     ===================================================================== */
  const apps = [
    {
      name: "Frigopolis",
      desc: "Inventaire familial auto-hébergé : scanne tes produits, suis les dates de péremption et ne gaspille plus rien. Application Android et tableau de bord web.",
      ac: "#8AA468",
      icon: "frigopolis.svg",
      status: "Alpha · bientôt sur le Play Store",
      links: [ { label: "Confidentialité", href: "/frigopolis-legal/" } ]
    }
    // , { name:"…", desc:"…", ac:"#5E86A6", icon:null, status:"Bientôt", links:[{label:"En savoir plus", href:"#"}] }
  ];

  const list = document.getElementById("list");
  apps.forEach((app, i) => {
    const row = document.createElement("article");
    row.className = "row rv";
    row.style.setProperty("--d", (0.46 + i*0.09) + "s");
    row.style.setProperty("--ac", app.ac || "#8AA468");
    const no = String(i+1).padStart(2,"0");
    const art = app.icon
      ? `<div class="art"><img src="${app.icon}" alt="Logo ${app.name}" loading="lazy"></div>`
      : `<div class="art mono"><span>${(app.name||"?").trim().charAt(0)}</span></div>`;
    const links = (app.links||[]).map(l => {
      const ext = /^https?:/.test(l.href) ? ' target="_blank" rel="noopener"' : '';
      return `<a href="${l.href}"${ext}>${l.label} <span aria-hidden="true">↗</span></a>`;
    }).join("");
    row.innerHTML = `
      <span class="no">${no}</span>
      <div class="main">
        <h2>${app.name}</h2>
        <p>${app.desc||""}</p>
        ${app.status ? `<span class="status"><span class="dot"></span>${app.status}</span>` : ""}
        ${links ? `<div class="links">${links}</div>` : ""}
      </div>
      ${art}`;
    list.appendChild(row);
  });

  const soon = document.createElement("article");
  soon.className = "row soon rv";
  soon.style.setProperty("--d", (0.46 + apps.length*0.09) + "s");
  soon.innerHTML = `<span class="no">${String(apps.length+1).padStart(2,"0")}</span>
    <div class="main"><h2>Bientôt</h2><p>D'autres applications sont en préparation.</p></div>`;
  list.appendChild(soon);

  const y = new Date().getFullYear();
  document.querySelectorAll(".y").forEach(n => n.textContent = y);
</script>
</body>
</html>
