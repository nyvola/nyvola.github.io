<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nyvola · Studio</title>
<meta name="description" content="Nyvola, studio indépendant. Des applications domestiques, utiles, auto-hébergeables et sans pistage.">
<meta name="color-scheme" content="dark">
<link rel="icon" href="frigopolis.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16130D; --bg-2:#1F1B13; --cream:#ECE3CF; --muted:#968D78;
    --terra:#D5814F; --grass:#8AA468; --line:rgba(236,227,207,.12);
    --serif:"Newsreader",Georgia,serif; --sans:"Hanken Grotesk",system-ui,sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--cream); font-family:var(--sans); font-size:16px; line-height:1.55;
    -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; min-height:100dvh; overflow:hidden;
    padding:clamp(20px,3.4vh,34px) clamp(22px,5vw,56px);
    background-image:radial-gradient(70% 60% at 85% 0%, rgba(213,129,79,.10), transparent 60%);
  }
  a{color:inherit; text-decoration:none}

  .top{display:flex; align-items:center; justify-content:space-between; font-size:.72rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); flex:0 0 auto}
  .top .nm{color:var(--cream)} .top .nm b{color:var(--terra); font-weight:500}

  main{flex:1 1 auto; display:flex; flex-direction:column; justify-content:center; gap:clamp(20px,3.4vh,34px); max-width:760px; width:100%; margin:0 auto; min-height:0}
  .intro .kick{font-size:.72rem; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:var(--terra); margin-bottom:14px}
  .intro h1{font-family:var(--serif); font-weight:400; font-size:clamp(1.7rem,4.2vw,2.6rem); line-height:1.12; letter-spacing:-.01em; max-width:18ch}
  .intro h1 em{font-style:italic; color:var(--terra)}
  .intro p{color:var(--muted); margin-top:14px; max-width:50ch; font-size:clamp(.95rem,1.6vw,1.05rem)}

  .apps{display:flex; flex-direction:column; gap:12px}
  .card{display:flex; align-items:center; gap:18px; padding:18px 20px; border:1px solid var(--line); border-radius:16px; background:var(--bg-2); transition:border-color .25s, transform .25s}
  .card:hover{border-color:rgba(236,227,207,.26); transform:translateY(-2px)}
  .card .logo{width:54px; height:54px; border-radius:13px; overflow:hidden; flex:0 0 auto; border:1px solid var(--line)}
  .card .logo img{width:100%; height:100%; object-fit:cover; display:block}
  .card .logo.mono{display:grid; place-items:center; background:var(--bg)}
  .card .logo.mono span{font-family:var(--serif); font-style:italic; color:var(--ac,var(--grass)); font-size:1.5rem}
  .card .info{min-width:0; flex:1}
  .card .info .h{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap}
  .card .info h2{font-family:var(--serif); font-weight:500; font-size:1.3rem; line-height:1.1}
  .card .info .status{font-size:.7rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); display:inline-flex; align-items:center; gap:7px}
  .card .info .status .dot{width:6px; height:6px; border-radius:50%; background:var(--ac,var(--grass))}
  .card .info p{color:var(--muted); font-size:.92rem; margin-top:4px; line-height:1.45}
  .card .go{flex:0 0 auto; align-self:center}
  .card .go a{font-size:.74rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--terra); display:inline-flex; align-items:center; gap:6px; white-space:nowrap; transition:gap .2s}
  .card .go a:hover{gap:10px}

  footer{flex:0 0 auto; display:flex; flex-wrap:wrap; gap:6px 20px; justify-content:space-between; font-size:.78rem; color:var(--muted)}
  footer a{color:var(--terra)}

  :focus-visible{outline:2px solid var(--terra); outline-offset:3px; border-radius:3px}
  @media (max-width:560px){
    body{overflow:auto}
    .card{flex-wrap:wrap}
    .card .go{width:100%; padding-left:72px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>
  <div class="top">
    <span class="nm"><b>✶</b> Nyvola</span>
    <span>Studio indépendant</span>
  </div>

  <main>
    <div class="intro">
      <p class="kick">Logiciels domestiques</p>
      <h1>Des outils <em>faits main</em> pour la maison.</h1>
      <p>Des applications utiles, auto-hébergeables et sans pistage, soignées jusqu'au détail.</p>
    </div>
    <div class="apps" id="list"></div>
  </main>

  <footer>
    <span>Nyvola, conçu et auto-hébergé avec soin.</span>
    <span><a href="mailto:nyvolastudio@gmail.com">nyvolastudio@gmail.com</a> · © <span class="y"></span></span>
  </footer>

<script>
  /* Catalogue. Ajouter une appli = un objet { ... }.
     ac: couleur d'accent · icon: fichier image ou null (monogramme)
     status: texte court · links: { label, href } (le 1er sert de bouton) */
  const apps = [
    {
      name: "Frigopolis",
      desc: "Inventaire familial auto-hébergé : scanne, suis les dates de péremption, ne gaspille plus.",
      ac: "#8AA468",
      icon: "frigopolis.svg",
      status: "Alpha",
      links: [ { label: "Confidentialité", href: "/frigopolis-legal/" } ]
    },
    {
      name: "Soldopolis",
      desc: "Calcule le prix soldé en un instant : réductions cumulées, simple et rapide.",
      ac: "#CBEE4A",
      icon: "soldopolis.svg",
      status: "Alpha",
      links: [ { label: "Confidentialité", href: "/soldopolis-legal/" } ]
    },
    {
      name: "Setopolis",
      desc: "Carnet de tennis : note tes matchs, évalue tes adversaires, suis tes statistiques.",
      ac: "#D8E84A",
      icon: "setopolis.svg",
      status: "Alpha",
      links: [ { label: "Confidentialité", href: "/setopolis-legal/" } ]
    }
  ];

  const list = document.getElementById("list");
  apps.forEach(app => {
    const c = document.createElement("article"); c.className = "card";
    c.style.setProperty("--ac", app.ac || "#8AA468");
    const logo = app.icon
      ? `<div class="logo"><img src="${app.icon}" alt="Logo ${app.name}" loading="lazy"></div>`
      : `<div class="logo mono"><span>${(app.name||"?").trim().charAt(0)}</span></div>`;
    const link = (app.links && app.links[0]) ? `<div class="go"><a href="${app.links[0].href}">${app.links[0].label} <span aria-hidden="true">↗</span></a></div>` : "";
    c.innerHTML = `${logo}
      <div class="info">
        <div class="h"><h2>${app.name}</h2>${app.status ? `<span class="status"><span class="dot"></span>${app.status}</span>` : ""}</div>
        <p>${app.desc||""}</p>
      </div>${link}`;
    list.appendChild(c);
  });

  const y = new Date().getFullYear();
  document.querySelectorAll(".y").forEach(n => n.textContent = y);
</script>
</body>
</html>
